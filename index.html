<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Notch Workout Email Analysis</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">Run training log</p>
          <h1>Notch workout email analysis</h1>
        </div>
      </header>

      <section class="assumptions" aria-label="Analysis assumptions">
        <span>Workout start: Wednesday 5:15 PM ET</span>
        <span>Emails match to the next workout</span>
        <span>Original workout emails only</span>
        <span>Lead time shown in hours</span>
      </section>

      <section id="summary" class="summary-grid" aria-label="Summary metrics"></section>

      <section class="chart-panel" aria-labelledby="trendTitle">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Trend</p>
            <h2 id="trendTitle">Lead time over time</h2>
          </div>
          <div id="trendSummary" class="trend-summary"></div>
        </div>
        <div id="chart" class="chart" role="img" aria-label="Email lead time trend chart"></div>
      </section>

      <section id="leaderboards" class="leaderboard-grid" aria-label="Lead time leaderboards"></section>

      <details class="records-panel" aria-labelledby="recordsTitle">
        <summary class="records-summary">
          <div>
            <p class="eyebrow">Emails</p>
            <h2 id="recordsTitle">Analyzed workout sends</h2>
          </div>
          <div class="records-summary-meta">
            <span id="recordCount" class="record-count"></span>
            <span class="accordion-chevron" aria-hidden="true"></span>
          </div>
        </summary>
        <div class="records-content">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th aria-sort="none">
                    <button type="button" class="sort-button" data-sort="workoutAt">
                      Workout <span class="sort-indicator" aria-hidden="true"></span>
                    </button>
                  </th>
                  <th aria-sort="descending">
                    <button type="button" class="sort-button" data-sort="sentAt">
                      Email sent <span class="sort-indicator" aria-hidden="true"></span>
                    </button>
                  </th>
                  <th aria-sort="none">
                    <button type="button" class="sort-button" data-sort="leadHours">
                      Lead time <span class="sort-indicator" aria-hidden="true"></span>
                    </button>
                  </th>
                  <th aria-sort="none">
                    <button type="button" class="sort-button" data-sort="subject">
                      Subject <span class="sort-indicator" aria-hidden="true"></span>
                    </button>
                  </th>
                </tr>
              </thead>
              <tbody id="records"></tbody>
            </table>
          </div>
        </div>
      </details>
    </main>

    <script src="app.js"></script>
  </body>
</html>
